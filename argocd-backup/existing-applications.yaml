apiVersion: v1
items:
- apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: app-of-apps
    namespace: argocd
  spec:
    destination:
      namespace: argocd
      server: https://kubernetes.default.svc
    project: default
    source:
      path: apps
      repoURL: https://github.com/youssefhatem90/my-cluster-config.git
      targetRevision: HEAD
    syncPolicy:
      automated:
        enabled: false
        prune: true
        selfHeal: true
- apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    annotations:
      argocd.argoproj.io/tracking-id: app-of-apps:argoproj.io/Application:argocd/fas-dev1
    name: fas-dev1
    namespace: argocd
  spec:
    destination:
      namespace: fas-dev1
      server: https://kubernetes.default.svc
    project: default
    source:
      path: workloads/fas-dev1
      repoURL: https://github.com/youssefhatem90/my-cluster-config.git
      targetRevision: HEAD
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
kind: List
metadata: {}
